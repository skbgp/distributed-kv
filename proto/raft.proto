syntax = "proto3";

package raft;

option go_package = "github.com/shubham/distributed-kv/proto";

// ---- Raft Consensus RPCs ----

// RequestVote is sent by candidates during leader election.
// Each candidate asks other nodes "will you vote for me?"
// A node votes YES if:
//   1. The candidate's term is >= the node's current term
//   2. The node hasn't already voted for someone else in this term
//   3. The candidate's log is at least as up-to-date as the node's log
message RequestVoteRequest {
    uint64 term = 1;            // candidate's current term number
    uint32 candidate_id = 2;    // who's asking for the vote
    uint64 last_log_index = 3;  // index of candidate's last log entry
    uint64 last_log_term = 4;   // term of candidate's last log entry
}

message RequestVoteResponse {
    uint64 term = 1;            // responder's current term (for candidate to update itself)
    bool vote_granted = 2;      // true = "yes, I vote for you"
}

// AppendEntries serves double duty:
//   1. When entries is empty → it's a heartbeat ("I'm still alive, don't start an election")
//   2. When entries is non-empty → it's log replication ("here are new entries to add")
//
// The prev_log_index and prev_log_term fields are how Raft ensures log consistency.
// Before accepting entries, a follower checks that it has the entry at prev_log_index
// with the matching term. If not, there's a gap or conflict and the leader needs to
// back up and resend earlier entries.
message AppendEntriesRequest {
    uint64 term = 1;             // leader's current term
    uint32 leader_id = 2;       // so followers know who the leader is
    uint64 prev_log_index = 3;  // index of the entry right before the new ones
    uint64 prev_log_term = 4;   // term of that entry (for consistency check)
    repeated LogEntry entries = 5; // new entries to append (empty = heartbeat)
    uint64 leader_commit = 6;   // leader's commit index (tells followers what's safe to apply)
}

message AppendEntriesResponse {
    uint64 term = 1;            // responder's current term
    bool success = 2;           // true if the entries were accepted
    uint64 match_index = 3;     // highest log index known to be replicated on this follower
}

// LogEntry is a single entry in the Raft log. Each entry contains a
// command to be applied to the state machine (our KV store) and the
// term in which it was created.
message LogEntry {
    uint64 term = 1;            // the term when this entry was created
    uint64 index = 2;           // position in the log (1-indexed)
    bytes command = 3;          // the actual command (serialized KV operation)
}

// ---- KV Store RPCs ----

// These are the client-facing RPCs. Clients talk to the leader to
// read and write data. If a client accidentally contacts a follower,
// the follower returns the leader's address so the client can redirect.

message PutRequest {
    string key = 1;
    bytes value = 2;
}

message PutResponse {
    bool success = 1;
    string error = 2;
    string leader_hint = 3;     // if this node isn't the leader, tells client where to go
}

message GetRequest {
    string key = 1;
}

message GetResponse {
    bool found = 1;
    bytes value = 2;
    string error = 3;
    string leader_hint = 4;
}

message DeleteRequest {
    string key = 1;
}

message DeleteResponse {
    bool success = 1;
    string error = 2;
    string leader_hint = 3;
}

// ---- Service Definitions ----

service RaftService {
    rpc RequestVote(RequestVoteRequest) returns (RequestVoteResponse);
    rpc AppendEntries(AppendEntriesRequest) returns (AppendEntriesResponse);
}

service KVService {
    rpc Put(PutRequest) returns (PutResponse);
    rpc Get(GetRequest) returns (GetResponse);
    rpc Delete(DeleteRequest) returns (DeleteResponse);
}
