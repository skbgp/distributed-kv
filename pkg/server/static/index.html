<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DistKV Dashboard</title>

    <style>
        :root {
            --bg: #f3f5f7;
            --panel: #ffffff;
            --border: #d8dde3;
            --text: #222831;
            --muted: #6b7280;

            --leader: #2e8b57;
            --follower: #2563eb;
            --candidate: #d97706;

            --danger: #d94841;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: Inter, "Segoe UI", Arial, sans-serif;
            padding: 24px;
            line-height: 1.45;
        }

        .container {
            max-width: 1100px;
            margin: auto;
        }

        header {
            margin-bottom: 28px;
        }

        header h1 {
            font-size: 30px;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .subtitle {
            color: var(--muted);
            font-size: 14px;
        }

        .status-badge {
            display: inline-block;
            margin-top: 10px;
            padding: 5px 12px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .status-badge.leader {
            background: #e7f7ee;
            color: var(--leader);
        }

        .status-badge.follower {
            background: #eef4ff;
            color: var(--follower);
        }

        .status-badge.candidate {
            background: #fff5dd;
            color: var(--candidate);
        }

        .grid {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 24px;
        }

        .card {
            flex: 1;
            min-width: 220px;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 18px;
        }

        .card-label {
            color: var(--muted);
            font-size: 13px;
            margin-bottom: 8px;
        }

        .card-value {
            font-size: 32px;
            font-weight: 700;
            font-family: Consolas, monospace;
        }

        .panel {
            background: white;
            border: 1px solid var(--border);
            border-radius: 8px;
            margin-bottom: 22px;
        }

        .panel-header {
            padding: 14px 18px;
            border-bottom: 1px solid var(--border);
            font-weight: 600;
        }

        .panel-body {
            padding: 18px;
        }

        .form-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 14px;
        }

        input[type="text"] {
            width: 100%;
            padding: 11px 12px;
            border: 1px solid #cfd6dd;
            border-radius: 6px;
            font-size: 14px;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #2563eb;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-bottom: 14px;
        }

        button {
            border: none;
            cursor: pointer;
            border-radius: 6px;
            padding: 10px 18px;
            font-size: 14px;
            font-weight: 600;
        }

        .btn-primary {
            background: #2563eb;
            color: white;
        }

        .btn-primary:hover {
            background: #1d4ed8;
        }

        .btn-outline {
            background: white;
            border: 1px solid var(--border);
        }

        .btn-outline:hover {
            background: #f4f4f4;
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .btn-danger:hover {
            background: #c0392b;
        }

        #result {
            background: #f8fafc;
            border-left: 4px solid #2563eb;
            padding: 12px;
            min-height: 48px;
            border-radius: 4px;
            font-family: Consolas, monospace;
        }

        #result.error {
            background: #fff5f5;
            border-left-color: var(--danger);
        }

        .log-container {
            background: #161b22;
            color: #d6dde5;
            height: 320px;
            overflow-y: auto;
            padding: 14px;
            font-family: Consolas, monospace;
            font-size: 13px;
        }

        .log-entry {
            padding: 6px 0;
            border-bottom: 1px solid #28323d;
        }

        .log-time {
            color: #8b949e;
            margin-right: 8px;
        }

        .log-op {
            color: #58a6ff;
            font-weight: 700;
            margin-right: 8px;
        }

        @media (max-width: 700px) {
            .form-group {
                grid-template-columns: 1fr;
            }

            .grid {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>

    <div class="container">

        <header>
            <h1>DistKV Dashboard</h1>
            <div class="subtitle">
                Node ID:
                <strong id="nodeId">-</strong>
                &nbsp;•&nbsp;
                Current Term:
                <strong id="termNum">0</strong>
            </div>

            <span id="stateBadge" class="status-badge">
                Unknown
            </span>
        </header>

        <div class="grid">

            <div class="card">
                <div class="card-label">Raft Log Entries</div>
                <div class="card-value" id="logLen">0</div>
            </div>

            <div class="card">
                <div class="card-label">Active MemTable Entries</div>
                <div class="card-value" id="memEntries">0</div>
            </div>

            <div class="card">
                <div class="card-label">Persisted SSTables</div>
                <div class="card-value" id="sstCount">0</div>
            </div>

        </div>

        <div class="panel">

            <div class="panel-header">
                Client Operations
            </div>

            <div class="panel-body">

                <div class="form-group">
                    <input type="text" id="keyInput" placeholder="Key (example: user:101)">

                    <input type="text" id="valInput" placeholder="Value (required for PUT)">
                </div>

                <div class="btn-group">
                    <button class="btn-primary" onclick="doPut()">PUT</button>
                    <button class="btn-outline" onclick="doGet()">GET</button>
                    <button class="btn-danger" onclick="doDelete()">DELETE</button>
                </div>

                <div id="result">
                    Ready for client requests.
                </div>

            </div>
        </div>

        <div class="panel">

            <div class="panel-header">
                Raft Event Log
            </div>

            <div class="panel-body" style="padding:0">

                <div id="opLog" class="log-container">

                    <div class="log-entry">
                        <span class="log-time">[SYSTEM]</span>
                        Dashboard connected to API
                    </div>

                </div>

            </div>
        </div>

    </div>

    <script>

        function fetchStatus() {
            fetch('/api/status')
                .then(r => r.json())
                .then(data => {

                    document.getElementById('nodeId').textContent =
                        data.node_id;

                    document.getElementById('termNum').textContent =
                        data.term;

                    document.getElementById('logLen').textContent =
                        data.log_length;

                    document.getElementById('memEntries').textContent =
                        data.storage.memtable_entries;

                    document.getElementById('sstCount').textContent =
                        data.storage.sstable_count;

                    const badge =
                        document.getElementById('stateBadge');

                    badge.textContent = data.state;

                    badge.className =
                        'status-badge ' +
                        data.state.toLowerCase();

                })
                .catch(() => { });
        }

        setInterval(fetchStatus, 2000);
        fetchStatus();

        function showResult(text, isError = false) {

            const el = document.getElementById('result');

            el.textContent = text;

            el.className =
                isError ? 'error' : '';
        }

        function addLog(op, key, msg) {

            const log =
                document.getElementById('opLog');

            const div =
                document.createElement('div');

            div.className = 'log-entry';

            const time =
                new Date().toLocaleTimeString();

            div.innerHTML =
                `<span class="log-time">[${time}]</span>
         <span class="log-op">${op}</span>
         ${key} → ${msg}`;

            log.insertBefore(div, log.firstChild);

            if (log.children.length > 50)
                log.removeChild(log.lastChild);
        }

        function doPut() {

            const key =
                document.getElementById('keyInput')
                    .value.trim();

            const val =
                document.getElementById('valInput')
                    .value.trim();

            if (!key || !val) {
                showResult(
                    'Error: key and value required.',
                    true
                );
                return;
            }

            fetch('/api/kv/' + encodeURIComponent(key), {
                method: 'PUT',
                headers: {
                    'Content-Type':
                        'application/json'
                },
                body: JSON.stringify({
                    value: val
                })
            })
                .then(r => r.json())
                .then(data => {

                    if (data.error) {

                        showResult(
                            'Error: ' + data.error,
                            true
                        );

                        addLog('PUT', key, 'FAILED');

                    } else {

                        showResult(
                            'Write replicated successfully.'
                        );

                        addLog('PUT', key, val);
                    }
                })
                .catch(() => {
                    showResult('Network error.', true);
                });
        }

        function doGet() {

            const key =
                document.getElementById('keyInput')
                    .value.trim();

            if (!key) {
                showResult(
                    'Error: key required.',
                    true
                );
                return;
            }

            fetch('/api/kv/' +
                encodeURIComponent(key))
                .then(r => r.json())
                .then(data => {

                    if (data.error) {

                        showResult(
                            'Key not found.',
                            true
                        );

                        addLog(
                            'GET',
                            key,
                            'MISS'
                        );

                    } else {

                        showResult(
                            'Value: ' +
                            data.value
                        );

                        addLog(
                            'GET',
                            key,
                            data.value
                        );
                    }
                })
                .catch(() => {
                    showResult(
                        'Network error.',
                        true
                    );
                });
        }

        function doDelete() {

            const key =
                document.getElementById('keyInput')
                    .value.trim();

            if (!key) {
                showResult(
                    'Error: key required.',
                    true
                );
                return;
            }

            fetch('/api/kv/' +
                encodeURIComponent(key), {
                method: 'DELETE'
            })
                .then(r => r.json())
                .then(data => {

                    if (data.error) {

                        showResult(
                            'Error: ' + data.error,
                            true
                        );

                        addLog(
                            'DEL',
                            key,
                            'FAILED'
                        );

                    } else {

                        showResult(
                            'Tombstone appended.'
                        );

                        addLog(
                            'DEL',
                            key,
                            'DELETED'
                        );
                    }
                })
                .catch(() => {
                    showResult(
                        'Network error.',
                        true
                    );
                });
        }

        document
            .getElementById('keyInput')
            .addEventListener('keydown', e => {
                if (e.key === 'Enter')
                    doGet();
            });

    </script>

</body>

</html>
